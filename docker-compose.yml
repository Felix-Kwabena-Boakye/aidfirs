version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=True
      - MONGO_URI=mongodb://mongodb:27017/ai_digital_forensics
      - CELERY_BROKER_URL=redis://redis:6379/0
    volumes:
      - /mnt:/mnt:ro
      - /host:/host:ro
      - backend_sqlite:/app/backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/cases/"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 20s

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A backend worker --loglevel=info
    working_dir: /app/backend
    env_file:
      - .env
    environment:
      - DEBUG=True
      - MONGO_URI=mongodb://mongodb:27017/ai_digital_forensics
      - CELERY_BROKER_URL=redis://redis:6379/0
    volumes:
      - /mnt:/mnt:ro
      - /host:/host:ro
      - backend_sqlite:/app/backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  mongodb_data:
  backend_sqlite:
